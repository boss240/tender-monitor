name: УЗЕ Tender Scanner

on:
  schedule:
    # 02:00, 08:00, 14:00, 20:00 UTC (05,11,17,23 Київ)
    - cron: "0 2,8,14,20 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          UNGM_API_KEY: ${{ secrets.UNGM_API_KEY }}
          TED_API_KEY:  ${{ secrets.TED_API_KEY }}
        run: python scanner.py
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add results.json tender-monitor.html data/results.json
          git commit -m "Auto-update tenders: $(date)" || exit 0
          git push
 
